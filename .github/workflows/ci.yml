name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # nightly integration run

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.26.x"]
        module:
          - core
          - adapters/loggerslog
          - adapters/otelinit
          - adapters/otelpgx
          - components/grpcclient
          - components/grpcserver
          - components/httpserver
          - components/pgxpool
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}
      - name: test
        working-directory: ${{ matrix.module }}
        run: go test -short ./...
      - name: vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - core
          - adapters/loggerslog
          - adapters/otelinit
          - adapters/otelpgx
          - components/grpcclient
          - components/grpcserver
          - components/httpserver
          - components/pgxpool
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.x"
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}

  integration:
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    strategy:
      matrix:
        module:
          - adapters/otelpgx
          - components/pgxpool
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.x"
      - name: integration test (testcontainers uses the runner's Docker)
        working-directory: ${{ matrix.module }}
        run: go test -tags=integration ./...

  examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - examples/01-grpc-server
          - examples/02-multi-mode-binary
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.x"
      - name: build + vet example against local source
        working-directory: ${{ matrix.module }}
        run: |
          go build ./...
          go vet ./...
